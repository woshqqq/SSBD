name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # 저장소 이름을 자동으로 읽어와서 GitHub Pages 서브경로(/저장소이름/)에 맞게 빌드한다.
      # (npm run build -- --base=... 형태는 셸에 따라 인자 전달이 깨지는 경우가 있어 vite를 직접 호출한다.)
      - run: npx vite build --base=/${{ github.event.repository.name }}/
      # 딥링크(예: /game/3)로 바로 들어와도 404 대신 앱이 뜨도록 index.html을 404.html로도 복사.
      - run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
